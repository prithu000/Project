{% extends "converter/base.html" %}
{% load static %}

{% block title %}Connecting with Google — CamCap{% endblock %}

{% block content %}
<style>
    .google-auth-container {
        min-height: calc(100svh - 64px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,240,255,0.08) 0%, transparent 60%);
        padding: 2rem;
    }

    .google-auth-card {
        background: rgba(5,11,20,0.7);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 3rem 2rem;
        width: 100%;
        max-width: 440px;
        text-align: center;
        box-shadow: 0 0 0 1px rgba(0,240,255,0.05), 0 20px 60px rgba(0,0,0,0.6);
        backdrop-filter: blur(20px);
        position: relative;
        overflow: hidden;
    }

    .google-auth-card::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent 5%, var(--cyan) 50%, transparent 95%);
        box-shadow: 0 0 12px var(--cyan);
    }

    .spinner-container {
        position: relative;
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
    }

    .spinner {
        width: 100%;
        height: 100%;
        border: 3px solid rgba(0,240,255,0.1);
        border-top-color: var(--cyan);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 15px rgba(0,240,255,0.2);
    }

    .google-logo {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 32px;
        height: 32px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .auth-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .auth-subtitle {
        color: var(--text-secondary);
        font-size: 0.95rem;
        margin-bottom: 2rem;
    }

    .secure-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(16,185,129,0.05);
        color: var(--green);
        padding: 8px 16px;
        border-radius: 20px;
        border: 1px solid rgba(16,185,129,0.2);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.8rem;
    }

    .secure-badge svg {
        width: 16px;
        height: 16px;
    }
</style>

<div class="google-auth-container">
    <div class="google-auth-card">
        <div class="spinner-container">
            <div class="spinner"></div>
            <svg class="google-logo" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
        </div>

        <h2 class="auth-title">Connecting...</h2>
        <p class="auth-subtitle">Securely logging you in with Google</p>

        <div class="secure-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            End-to-End Encrypted
        </div>
    </div>
</div>

<script>
    // Only redirect if we haven't already received the auth code
    if (!window.location.search.includes('code=')) {
        setTimeout(function() {
            window.location.href = "{% url 'socialaccount_login' %}?provider=google&process=login";
        }, 1500);
    }
</script>
{% endblock %}
