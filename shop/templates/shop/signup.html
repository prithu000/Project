{% extends "converter/base.html" %}

{% block title %}Sign Up — CamCap{% endblock %}

{% block content %}
<section class="mt-4 center">
    <div class="card p-5 mx-auto text-left" style="max-width: 400px; width: 100%;">
        <h2 class="section-title mb-4 center">Create Account</h2>
        
        <form method="POST" action="{% url 'shop:signup' %}?next={{ request.GET.next|default:'/' }}">
            {% csrf_token %}
            
            <div class="form-group mb-3">
                <label>Username</label>
                <input type="text" name="username" class="input-field w-100" value="{{ username|default:'' }}" required>
            </div>
            
            <div class="form-group mb-3">
                <label>Email (Optional)</label>
                <input type="email" name="email" class="input-field w-100" value="{{ email|default:'' }}">
            </div>
            
            <div class="form-group mb-3">
                <label>Password</label>
                <input type="password" name="password" class="input-field w-100" required>
            </div>
            
            <div class="form-group mb-4">
                <label>Confirm Password</label>
                <input type="password" name="password2" class="input-field w-100" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100">Sign Up</button>
        </form>
        
        <p class="text-center mt-4 text-sm text-secondary">
            Already have an account? <a href="{% url 'shop:login' %}?next={{ request.GET.next|default:'/' }}" class="text-orange">Login</a>
        </p>
    </div>
</section>
{% endblock %}
