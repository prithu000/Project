{% extends "converter/base.html" %}

{% block title %}Login — CamCap{% endblock %}

{% block content %}
<section class="mt-4 center">
    <div class="card p-5 mx-auto text-left" style="max-width: 400px; width: 100%;">
        <h2 class="section-title mb-4 center">Login</h2>
        
        <form method="POST" action="{% url 'shop:login' %}?next={{ request.GET.next|default:'/' }}">
            {% csrf_token %}
            
            <div class="form-group mb-3">
                <label>Username</label>
                <input type="text" name="username" class="input-field w-100" required>
            </div>
            
            <div class="form-group mb-4">
                <label>Password</label>
                <input type="password" name="password" class="input-field w-100" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
        </form>
        
        <p class="text-center mt-4 text-sm text-secondary">
            Don't have an account? <a href="{% url 'shop:signup' %}?next={{ request.GET.next|default:'/' }}" class="text-orange">Sign up</a>
        </p>
    </div>
</section>
{% endblock %}
